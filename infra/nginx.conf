# Reverse proxy for theke: Next.js frontend on / , FastAPI backend under
# /api/ (stripped before proxying - the backend's own routes have no /api
# prefix, see frontend/app/lib/api.ts's API_URL, which should be set to
# "/api" in production .env so the browser always calls same-origin and
# never needs to know the backend's internal hostname).
#
# --- First-deploy bootstrap order (SSL cert doesn't exist yet) ---
#   1. Comment out the entire `server { listen 443 ... }` block below.
#   2. `docker compose -f docker-compose.prod.yml up -d nginx` (port 80 only).
#   3. Run certbot against the running nginx, e.g.:
#        docker run --rm \
#          -v theke_certbot_conf:/etc/letsencrypt \
#          -v theke_certbot_www:/var/www/certbot \
#          certbot/certbot certonly --webroot -w /var/www/certbot \
#          -d your-domain.example --email you@example.com --agree-tos
#      (the acme-challenge location below is what makes the webroot
#      validation work - it must be reachable on plain port 80).
#   4. Uncomment the 443 block, replace "your-domain.example" everywhere
#      below with the real domain, and reload:
#        docker compose -f docker-compose.prod.yml exec nginx nginx -s reload
#   5. Renewal (`certbot renew`) reuses the same webroot path and doesn't
#      need nginx reconfigured - just re-run periodically (e.g. host cron
#      calling the same `docker run certbot/certbot renew` command) since
#      no renewal automation is wired into this compose file yet.

server {
    listen 80;
    server_name your-domain.example;

    # Must stay reachable over plain HTTP, unredirected - both for initial
    # issuance (step 3 above) and every renewal afterward.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

