# Production compose file. Differences from docker-compose.yml (dev):
#   - No bind mounts anywhere - every image bakes its own code in
#     (backend/Dockerfile.prod, frontend/Dockerfile.prod), so there's
#     nothing to overlay and no --reload/npm-run-dev dev servers.
#   - restart policies set on every long-running service.
#   - Postgres/Redis ports are NOT published to the host - only nginx is
#     internet-facing; backend/frontend are reachable from the host on
#     127.0.0.1 only, for local debugging/health checks, never externally.
#   - No fallback defaults on required env vars (${VAR}, not ${VAR:-x}) -
#     an unset required var should fail loudly, not silently run with a
#     dev placeholder in production.
#
# Usage: docker compose -f docker-compose.prod.yml up --build -d
# (see scripts/deploy.sh, which wraps this with a migration + health check
# step).

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend

  # One-off/manual crawl run - `docker compose -f docker-compose.prod.yml
  # --profile crawler run --rm crawler`. Not part of the default `up`.
  crawler:
    build: ./crawler
    env_file: .env
    profiles:
      - crawler
    depends_on:
      postgres:
        condition: service_healthy

  # The persistent scheduled process (supercronic running crawler/crontab) -
  # unlike `crawler` above, this belongs in the default `up`.
  # depends_on backend too: the weekly canary_benchmark job calls POST
  # /chat/message over HTTP, unlike the other scheduled jobs.
  scheduler:
    build: ./crawler
    env_file: .env
    command: ["supercronic", "/app/crontab"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  certbot_conf:
  certbot_www:
