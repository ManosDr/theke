services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-theke}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-theke}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-theke}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build: ./frontend
    env_file: .env
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

  crawler:
    build: ./crawler
    env_file: .env
    volumes:
      - ./crawler:/app
    profiles:
      - crawler
    depends_on:
      postgres:
        condition: service_healthy

  # Runs the same crawler image continuously, executing crawler/main.py on
  # the schedule defined in crawler/crontab (monthly by default). No Docker
  # socket mounting required - supercronic runs the job in-process.
  # depends_on backend too: the weekly canary_benchmark job (crawler/crawler/
  # canary_benchmark.py) calls POST /chat/message over HTTP, unlike the
  # other scheduled jobs which only ever talk to Postgres directly.
  scheduler:
    build: ./crawler
    env_file: .env
    command: ["supercronic", "/app/crontab"]
    # Same uploads_data volume the backend service mounts, at the same
    # /app/uploads path - crawler/crawler/retention_cleanup.py needs to
    # physically remove a deleted company's uploaded files, not just their
    # DB rows, and this is the only container that job runs in. Without this
    # mount the job would still delete the DB rows correctly but silently
    # leave every file orphaned on disk - see that file's module docstring.
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  uploads_data:
